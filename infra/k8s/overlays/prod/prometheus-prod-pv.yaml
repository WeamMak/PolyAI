apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-prod-pv
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-sc
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: prod
    name: prometheus-pvc
  csi:
    driver: ebs.csi.aws.com
    volumeHandle: vol-03efedd34d2f64888
    fsType: ext4
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - us-east-1b
