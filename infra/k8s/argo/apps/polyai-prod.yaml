apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: polyai-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/WeamMak/PolyAI.git
    targetRevision: main
    path: infra/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
