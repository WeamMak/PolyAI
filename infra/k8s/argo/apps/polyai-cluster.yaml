apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: polyai-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/WeamMak/PolyAI.git
    targetRevision: refs/heads/main
    path: infra/k8s/cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: true
