apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: polyai-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/WeamMak/PolyAI.git
    targetRevision: dev
    path: infra/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
