name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  yolo-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r services/yolo/torch-requirements.txt
          pip install -r services/yolo/requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=xml:coverage.xml
        working-directory: services/yolo

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: services/yolo/coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  agent-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r services/agent/requirements.txt

      - name: Run agent tests
        run: pytest services/agent/tests

  img-proc-mcp-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r services/img-proc-mcp/requirements.txt

      - name: Run image-processing MCP tests
        run: pytest services/img-proc-mcp/tests/test_app.py
