name: Docker Scout

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  scan-images:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: yolo
            image: yolo-service
            context: services/yolo
          - service: agent
            image: agent-service
            context: services/agent
          - service: frontend
            image: frontend-service
            context: services/frontend
          - service: img-proc-mcp
            image: img-proc-mcp-service
            context: services/img-proc-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: weammakhoul/${{ matrix.image }}:scout-${{ github.sha }}

      - name: Scan ${{ matrix.service }} image with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://weammakhoul/${{ matrix.image }}:scout-${{ github.sha }}
          only-severities: critical,high,medium
          summary: true
