name: Deploy PolyAI

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev instance
        uses: appleboy/ssh-action@v1
        with:
          host: dev.weam.fursa.click
          username: ubuntu
          key: ${{ secrets.DEV_INSTANCE_SSH_KEY }}
          script: |
            cd /home/ubuntu/PolyAI
            git fetch origin
            git reset --hard origin/dev

            if [ ! -d "/home/ubuntu/PolyAI/.venv" ]; then
              python3 -m venv /home/ubuntu/PolyAI/.venv
            fi

              /home/ubuntu/PolyAI/.venv/bin/python -m pip install --upgrade pip
              /home/ubuntu/PolyAI/.venv/bin/python -m pip install -r /home/ubuntu/PolyAI/services/yolo/torch-requirements.txt
              /home/ubuntu/PolyAI/.venv/bin/python -m pip install -r /home/ubuntu/PolyAI/services/yolo/requirements.txt
              /home/ubuntu/PolyAI/.venv/bin/python -m pip install -r /home/ubuntu/PolyAI/services/agent/requirements.txt


            cd /home/ubuntu/PolyAI/services/frontend
            npm ci
            npm run build

            sudo systemctl daemon-reload
            sudo systemctl restart yolo.service
            sudo systemctl restart agent.service
            sudo systemctl restart frontend.service

            sudo systemctl status yolo.service --no-pager
            sudo systemctl status agent.service --no-pager
            sudo systemctl status frontend.service --no-pager


  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod instance
        uses: appleboy/ssh-action@v1
        with:
          host: prod.weam.fursa.click
          username: ubuntu
          key: ${{ secrets.PROD_INSTANCE_SSH_KEY }}
          script: |
            cd /home/ubuntu/PolyAI
            git fetch origin
            git reset --hard origin/main

            if [ ! -d "/home/ubuntu/PolyAI/.venv" ]; then
              python3 -m venv /home/ubuntu/PolyAI/.venv
            fi

              /home/ubuntu/PolyAI/.venv/bin/python -m pip install --upgrade pip
              /home/ubuntu/PolyAI/.venv/bin/python -m pip install -r /home/ubuntu/PolyAI/services/yolo/torch-requirements.txt
              /home/ubuntu/PolyAI/.venv/bin/python -m pip install -r /home/ubuntu/PolyAI/services/yolo/requirements.txt
              /home/ubuntu/PolyAI/.venv/bin/python -m pip install -r /home/ubuntu/PolyAI/services/agent/requirements.txt


            cd /home/ubuntu/PolyAI/services/frontend
            npm ci
            npm run build

            sudo systemctl daemon-reload
            sudo systemctl restart yolo.service
            sudo systemctl restart agent.service
            sudo systemctl restart frontend.service

            sudo systemctl status yolo.service --no-pager
            sudo systemctl status agent.service --no-pager
            sudo systemctl status frontend.service --no-pager