name: Kubernetes YOLO GitOps

on:
  push:
    branches:
      - dev
      - main
    paths:
      - services/yolo/**
      - .github/workflows/k8s-yolo-gitops.yaml

permissions:
  contents: write

concurrency:
  group: k8s-yolo-gitops-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: docker.io/weammakhoul/yolo-service

jobs:
  build-update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Kubernetes environment
        id: environment
        shell: bash
        run: |
          if [ "$GITHUB_REF_NAME" = "dev" ]; then
            environment="dev"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            environment="prod"
          else
            echo "Unsupported branch: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          echo "name=$environment" >> "$GITHUB_OUTPUT"
          echo "image_tag=k8s-${environment}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "manifest=infra/k8s/overlays/${environment}/kustomization.yaml" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push YOLO image
        uses: docker/build-push-action@v6
        with:
          context: ./services/yolo
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ steps.environment.outputs.image_tag }}

      - name: Update Kubernetes image tag
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.environment.outputs.image_tag }}
          MANIFEST: ${{ steps.environment.outputs.manifest }}
        run: |
          set -euo pipefail

          image_name="docker.io/weammakhoul/yolo-service"

          if ! grep -q "^  - name: ${image_name}$" "$MANIFEST"; then
            echo "Could not find the YOLO image entry in $MANIFEST" >&2
            exit 1
          fi

          sed -i "/^  - name: ${image_name//\//\\/}\$/ {
            n
            s/^    newTag: .*/    newTag: ${IMAGE_TAG}/
          }" "$MANIFEST"

          if ! grep -A1 "^  - name: ${image_name}$" "$MANIFEST" | grep -q "^    newTag: ${IMAGE_TAG}$"; then
            echo "Failed to update the YOLO image tag in $MANIFEST" >&2
            exit 1
          fi

      - name: Commit and push manifest update
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.environment.outputs.image_tag }}
          MANIFEST: ${{ steps.environment.outputs.manifest }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"

          if git diff --cached --quiet; then
            echo "$MANIFEST already uses $IMAGE_TAG; nothing to commit."
            exit 0
          fi

          git commit -m "ci(k8s): update YOLO image to ${IMAGE_TAG} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
