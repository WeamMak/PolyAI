services:
  frontend:
    image: ${DOCKERHUB_NAMESPACE:-weammakhoul}/frontend-service:${FRONTEND_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AGENT_URL: ${NEXT_PUBLIC_AGENT_URL:-http://localhost:8000}
    depends_on:
      - agent
    networks:
      - polyai-net

  agent:
    image: ${DOCKERHUB_NAMESPACE:-weammakhoul}/agent-service:${AGENT_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./services/agent/.env
    environment:
      YOLO_SERVICE_URL: http://yolo:8080
    depends_on:
      - yolo
    networks:
      - polyai-net

  yolo:
    image: ${DOCKERHUB_NAMESPACE:-weammakhoul}/yolo-service:${YOLO_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./services/yolo/.env
    networks:
      - polyai-net

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - yolo
    networks:
      - monitoring-net
      - polyai-net

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring-net

networks:
  polyai-net:
    name: polyai-net
    driver: bridge
  monitoring-net:
    name: monitoring-net
    driver: bridge

volumes:
  grafana-data:
    name: grafana-data
  prometheus-data:
    name: prometheus-data
