services:
  frontend:
    image: ${DOCKERHUB_NAMESPACE:-weammakhoul}/frontend-service:${FRONTEND_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AGENT_URL: ${NEXT_PUBLIC_AGENT_URL:-http://localhost:8000}
    depends_on:
      - agent
    networks:
      - polyai-net

  agent:
    image: ${DOCKERHUB_NAMESPACE:-weammakhoul}/agent-service:${AGENT_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./services/agent/.env
    environment:
      YOLO_SERVICE_URL: http://yolo:8080
      IMG_PROC_MCP_URL: http://img-proc-mcp:8090
    depends_on:
      - yolo
      - img-proc-mcp
    networks:
      - polyai-net

  yolo:
    image: ${DOCKERHUB_NAMESPACE:-weammakhoul}/yolo-service:${YOLO_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./services/yolo/.env
    networks:
      - polyai-net

  img-proc-mcp:
    image: ${DOCKERHUB_NAMESPACE:-weammakhoul}/img-proc-mcp-service:${IMG_PROC_MCP_IMAGE_TAG:-0.0.1}
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8090
      DEBUG_OBJECT_SELECTION: ${DEBUG_OBJECT_SELECTION:-0}
    networks:
      - polyai-net

  node-exporter:
    image: prom/node-exporter:v1.10.2
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.processes"
    volumes:
      - "/:/host:ro,rslave"

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - yolo
      - node-exporter
    networks:
      - monitoring-net
      - polyai-net

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring-net

  fluent-bit:
    image: fluent/fluent-bit:4.2.7
    restart: unless-stopped
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log

networks:
  polyai-net:
    name: polyai-net
    driver: bridge
  monitoring-net:
    name: monitoring-net
    driver: bridge

volumes:
  grafana-data:
    name: grafana-data
  prometheus-data:
    name: prometheus-data
