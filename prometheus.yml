global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'agent-service'
    static_configs:
      - targets: ['agent:8000']

  - job_name: 'yolo-service'
    static_configs:
      - targets: ['yolo:8080']

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
