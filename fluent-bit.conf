[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name          tail
    Tag           docker.*
    Path          /var/lib/docker/containers/*/*-json.log
    Parser        docker
    DB            /var/log/flb_docker.db
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

[FILTER]
    Name          record_modifier
    Match         docker.*
    Record        host ${HOSTNAME}

[OUTPUT]
    Name              s3
    Match             *
    bucket            ${FLUENT_BIT_S3_BUCKET}
    region            ${AWS_REGION}
    s3_key_format     /logs/%Y/%m/%d/%H%M%S_$UUID.gz
    compression       gzip
    upload_timeout    60s
    use_put_object    On
    total_file_size   1M
    store_dir         /var/log/fluent-bit-s3
    store_dir_limit_size 500M
    preserve_data_ordering On
